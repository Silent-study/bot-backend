name: Backend Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy Backend to VPS
    runs-on: ubuntu-latest

    steps:
      - name: "📥 Step 1 - Checkout Latest Code"
        uses: actions/checkout@v3

      - name: "📦 Step 2 - Install Dependencies"
        run: |
          echo "Installing backend dependencies..."
          npm install
          echo "✅ Dependencies installed successfully"

      - name: "🔄 Step 3 - Deploy to VPS"
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/silentstudy/backend
            git pull origin main
            npm install
            pm2 restart backend
            echo "✅ Backend is live!"

      - name: "🎉 Step 4 - Deployment Complete"
        run: echo "🎉 Backend successfully deployed to silentstudy.net"
